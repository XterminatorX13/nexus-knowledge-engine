        header { background-color: var(--surface); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10; }

        .badge { background-color: var(--primary); color: white; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }

        /* Left Panel - Loose Files */
        .files-panel { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background-color: var(--surface); }
        
        .search-bar { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); background-color: var(--bg-color); }
        .search-bar input { width: 100%; padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid var(--border); background-color: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .search-bar input:focus { border-color: var(--primary); }

        .files-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .file-card { background-color: var(--bg-color); border: 2px solid transparent; border-radius: 0.5rem; padding: 0.75rem; cursor: grab; display: flex; flex-direction: column; gap: 0.5rem; transition: all 0.15s ease-out; position: relative; user-select: none; }
        .file-card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .file-card.selected { border-color: var(--primary); background-color: rgba(59, 130, 246, 0.1); }
        .file-card:active { cursor: grabbing; }
        
        .file-info { flex: 1; }
        .file-name { font-size: 0.85rem; font-weight: 500; word-break: break-all; }
        .file-path { font-size: 0.65rem; color: var(--text-muted); }
        
        /* Inline Actions (Scoring & Dropdown) */

        .btn-inline-suggest { flex: 1; background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); padding: 0.3rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; display: flex; justify-content: center; align-items: center; gap: 0.25rem; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .btn-inline-suggest:hover { background-color: var(--magic); color: white; }
        .btn-inline-suggest.no-match { opacity: 0.5; cursor: default; }
        .btn-inline-suggest.no-match:hover { background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd; }
        
        .folder-select-dropdown { background-color: var(--surface-hover); color: var(--text); border: 1px solid var(--border); border-radius: 0.25rem; padding: 0.2rem; font-size: 0.7rem; cursor: pointer; max-width: 30px; outline: none; }

        /* Dragging Avatar */
        .drag-avatar { position: absolute; top: -1000px; background-color: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 9999px; font-weight: 600; font-size: 0.8rem; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); pointer-events: none; }

        /* Center Panel - Miller Columns */
        .miller-panel { flex: 1; display: flex; overflow-x: auto; overflow-y: hidden; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); }
        .column { width: 280px; min-width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background-color: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); animation: slideIn 0.2s ease-out; }

        .column-header-dz { padding: 0.75rem; font-size: 0.8rem; font-weight: 500; text-align: center; color: var(--text-muted); border-bottom: 1px dashed var(--border); background-color: rgba(0,0,0,0.2); transition: all 0.2s; }
        .column-header-dz.drag-over { background-color: rgba(59, 130, 246, 0.2); color: var(--primary); border-color: var(--primary); }
        .column-list { flex: 1; overflow-y: auto; }
        .folder-item { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; font-size: 0.9rem; }
        .folder-item:hover { background-color: var(--surface-hover); }

        .chevron { color: var(--text-muted); font-size: 0.8rem; }

        // --- SISTEMA DE INTELIGÃŠNCIA (Scoring Engine) ---
        function scoreFolder(fileName, folderPath) {
            let score = 0;
            const nameL = fileName.toLowerCase();
            const pathL = folderPath.toLowerCase();
            
            // ExtensÃ£o
            const extMatch = nameL.match(/\.([^.]+)$/);
            const ext = extMatch ? extMatch[1] : '';

            // Regras de NegÃ³cios / Financeiro
            if (pathL.includes('finance') || pathL.includes('business')) {
                if (nameL.includes('fatura') || nameL.includes('comprovante') || nameL.includes('recibo') || nameL.includes('boleto') || nameL.includes('custos')) score += 50;
                if (['xls', 'xlsx', 'csv'].includes(ext)) score += 20;
            }
            // Regras Pessoais
            if (pathL.includes('personal') || pathL.includes('documentos')) {
                if (nameL.includes('rg') || nameL.includes('cnh') || nameL.includes('currÃ­culo') || nameL.includes('digital')) score += 50;
            }
            // Criativo / Imagens
            if (pathL.includes('creative') || pathL.includes('imagens')) {
                if (['jpg', 'jpeg', 'png', 'gif', 'svg'].includes(ext)) {
                    if (!nameL.includes('whatsapp') && !nameL.includes('screenshot')) score += 30;
                }
            }
            // Arquivo Morto / Takeout
            if (pathL.includes('archive') || pathL.includes('takeout') || pathL.includes('90')) {
                if (nameL.includes('takeout')) score += 100;
                if (nameL.includes('whatsapp') || nameL.includes('screenshot')) score += 40;
            }
            // Games
            if (pathL.includes('games') || pathL.includes('jogos')) {
                if (nameL.includes('game') || nameL.includes('jogo')) score += 50;
            }

            // Word Match (Qualquer palavra com mais de 3 letras que bata no caminho)
            const words = nameL.split(/[\s\-_.]+/);
            words.forEach(w => {
                if (w.length > 3 && pathL.includes(w)) score += 10;
            });

            // Prefere pastas mais profundas se der empate (ex: Financeiro > BUSINESS)
            score += folderPath.split('\\').length * 2;

            return score;
        }

        function getBestMatch(file) {
            let bestScore = -1;
            let bestFolder = null;
            allFolders.forEach(folder => {
                const s = scoreFolder(file.name, folder);
                if (s > bestScore && s > 15) { // Threshold mÃ­nimo de 15 pontos
                    bestScore = s;
                    bestFolder = folder;
                }
            });
            return { folder: bestFolder, score: bestScore };
        }

        function handleSelection(e, id, visibleItems) {
            if (e.ctrlKey || e.metaKey) {
                if (selectedFileIds.has(id)) selectedFileIds.delete(id);
                else selectedFileIds.add(id);
            } else if (e.shiftKey && lastSelectedId) {
                const startIdx = visibleItems.findIndex(i => i.id === lastSelectedId);
                const endIdx = visibleItems.findIndex(i => i.id === id);
                const min = Math.min(startIdx, endIdx);
                const max = Math.max(startIdx, endIdx);
                selectedFileIds.clear();
                for (let i = min; i <= max; i++) {
                    selectedFileIds.add(visibleItems[i].id);
                }
            } else {
                selectedFileIds.clear();
                selectedFileIds.add(id);
            }
            lastSelectedId = id;
            renderFiles();
        }

                const thisFolderPath = currentPathArray.length > 0 ? `${parentPathString}\\${folderName}` : folderName;
                setupDropZone(item, thisFolderPath);
                list.appendChild(item);
            });

            col.appendChild(list);
            container.appendChild(col);
        }

        function renderPendingMoves() {
            const list = document.getElementById('moves-list');
            list.innerHTML = '';
            document.getElementById('moves-count').textContent = pendingMoves.length;

            [...pendingMoves].reverse().forEach((move, reverseIdx) => {
                const realIdx = pendingMoves.length - 1 - reverseIdx;
                const el = document.createElement('div');
                el.className = 'move-card';
                el.innerHTML = `
                    <div class="move-file" title="${move.file.name}">${getIcon(move.file.name, move.file.isFolder)} ${move.file.name}</div>
                    <div class="move-target">âž¡ï¸ ${move.targetPath}</div>
                    <div class="move-actions">
                        <button class="btn-undo" onclick="undoMove(${realIdx})">â†©ï¸ Desfazer</button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        // --- Drag & Drop & Move Logic ---
        function setupDropZone(el, targetPath) {
            el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
            el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
            el.addEventListener('drop', e => {
                e.preventDefault();
                el.classList.remove('drag-over');
                const data = e.dataTransfer.getData('application/json');
                if (data && targetPath !== "") {
                    const ids = JSON.parse(data);
                    executeMove(ids, targetPath);
                }
            });
        }

        window.executeMove = function(fileIdsArray, targetPath) {
            fileIdsArray.forEach(id => {
                const idx = items.findIndex(i => i.id === id);
                if (idx > -1) {
                    const file = items[idx];
                    items.splice(idx, 1);
                    pendingMoves.push({ file, targetPath });
                }
            });
            selectedFileIds.clear();
            renderFiles();
            renderPendingMoves();
        };

        window.undoMove = function(index) {
            const move = pendingMoves[index];
            pendingMoves.splice(index, 1);
            items.push(move.file);
            renderFiles();
            renderPendingMoves();
        };

        // --- IA Preview & Confirm ---
        window.openAutoSuggestPreview = function() {
            previewMovesQueue = [];
            items.forEach(file => {
                const match = getBestMatch(file);
                if (match.folder) {
                    previewMovesQueue.push({ file, targetPath: match.folder, score: match.score });
                }
            });

            if (previewMovesQueue.length === 0) {
                alert("A InteligÃªncia Artificial nÃ£o encontrou sugestÃµes com alta confianÃ§a para os arquivos restantes.");
                return;
            }

            document.getElementById('preview-count').textContent = previewMovesQueue.length;
            const tbody = document.getElementById('preview-tbody');
            tbody.innerHTML = '';
            previewMovesQueue.sort((a,b) => b.score - a.score).forEach(m => {
                tbody.innerHTML += `
                    <tr>
                        <td>${getIcon(m.file.name, m.file.isFolder)} ${m.file.name}</td>
                        <td style="color:var(--success)">${m.targetPath}</td>
                        <td style="color:var(--text-muted)">${m.score} pts</td>
                    </tr>
                `;
            });

            document.getElementById('preview-modal').style.display = 'flex';
        };

        window.confirmAutoSuggest = function() {
            const ids = previewMovesQueue.map(m => m.file.id);
            // Move individualmente para o target certo (jÃ¡ que cada um tem o seu)
            previewMovesQueue.forEach(m => {
                executeMove([m.file.id], m.targetPath);
            });
            closeModal('preview-modal');
        };

        // --- Modals & Script Gen ---
        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

        window.generateScript = function() {
            let script = "# Script EvoluÃ§Ã£o Extrema\n$ErrorActionPreference = 'Stop'\n\n";
            if (pendingMoves.length === 0) {
                script += "# Nada para mover.\n";
            } else {
                const grouped = {};
                pendingMoves.forEach(m => {
                    if(!grouped[m.targetPath]) grouped[m.targetPath] = [];
                    grouped[m.targetPath].push(m.file);
                });
                Object.keys(grouped).forEach(targetFolder => {
                    script += `# Movendo para ${targetFolder}\n`;
                    const targetFullPath = `G:\\Meu Drive\\ORGANIZAR ESSA BOMBA\\${targetFolder}`;
                    script += `if (!(Test-Path -LiteralPath "${targetFullPath}")) { New-Item -ItemType Directory -Path "${targetFullPath}" -Force | Out-Null }\n`;
                    grouped[targetFolder].forEach(file => {
                        script += `Move-Item -LiteralPath "${file.fullPath}" -Destination "${targetFullPath}" -Force\n`;
                    });
                    script += `\n`;
                });
                script += "Write-Host 'Magia concluÃ­da!' -ForegroundColor Magenta\n";
            }
            document.getElementById('script-content').value = script;
            document.getElementById('script-modal').style.display = 'flex';
        };

        window.downloadScript = function() {
            const script = document.getElementById('script-content').value;
            const blob = new Blob([script], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Mover-Arquivos-Inteligente.ps1';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        };

        // Keyboard navigation (Basic)
        function handleKeyboardShortcuts(e) {
            // Se estiver num input, nÃ£o interceptar
            if(document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

            // Delete = desfazer o ultimo
            if(e.key === 'Backspace' && pendingMoves.length > 0) {
                undoMove(pendingMoves.length - 1);
            }
        }

        init();
    </script>
</body>
</html>
