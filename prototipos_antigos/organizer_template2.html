<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Visual do Drive (Avançado)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        header h1 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .actions { display: flex; gap: 1rem; }
        button {
            background-color: var(--primary); color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 0.5rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 0.5rem;
        }
        button:hover { background-color: var(--primary-hover); }
        button.success { background-color: var(--success); }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Coluna de Arquivos (agora também mostra pastas se a gente quiser, mas por enquanto os soltos) */
        .files-column {
            width: 380px; background-color: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .column-header {
            padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
        }
        .badge { background-color: var(--primary); color: white; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }
        .files-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .file-card {
            background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 0.5rem;
            padding: 0.75rem; cursor: grab; display: flex; flex-direction: column; gap: 0.25rem;
            transition: border-color 0.2s, transform 0.2s;
        }
        .file-card.is-folder { border-left: 3px solid var(--warning); }
        .file-card:active { cursor: grabbing; }
        .file-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .file-name { font-size: 0.85rem; font-weight: 500; word-break: break-all; }
        .file-path { font-size: 0.65rem; color: var(--text-muted); }

        /* Coluna de Pastas */
        .folders-column {
            flex: 1; padding: 2rem; overflow-y: auto;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }
        
        /* Layout Masonry simulado com Flexbox */
        .folders-masonry {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .top-folder-container {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            width: 320px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .top-folder-header {
            background-color: rgba(0,0,0,0.2);
            padding: 1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            border-top: 3px solid transparent;
            transition: all 0.2s;
        }
        
        /* Dropzone para a raiz da top folder */
        .drop-zone {
            padding: 0.5rem 1rem;
            min-height: 40px;
            background-color: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
        }
        .drop-zone.drag-over { background-color: rgba(59, 130, 246, 0.2); }
        .drop-zone-title { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .subfolders-list {
            display: flex; flex-direction: column;
        }

        .subfolder-item {
            border-bottom: 1px solid var(--border);
        }
        .subfolder-item:last-child { border-bottom: none; }
        
        .subfolder-header {
            padding: 0.5rem 1rem 0.5rem 2rem;
            font-size: 0.8rem;
            display: flex; align-items: center; gap: 0.5rem;
            background-color: rgba(255,255,255,0.02);
        }
        
        .subfolder-drop-zone {
            min-height: 30px;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            background-color: transparent;
            transition: background-color 0.2s;
        }
        .subfolder-drop-zone.drag-over { background-color: rgba(59, 130, 246, 0.2); }

        .moved-file {
            background-color: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            padding: 0.4rem 0.5rem;
            font-size: 0.7rem;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.25rem;
        }
        .undo-btn { background: none; border: none; color: #ef4444; cursor: pointer; padding: 0.2rem; border-radius: 0.25rem; font-size: 0.8rem; }
        .undo-btn:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 50;
        }
        .modal {
            background-color: var(--surface); border-radius: 1rem; width: 80%; max-width: 800px; max-height: 80vh;
            display: flex; flex-direction: column; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; }
        textarea { width: 100%; height: 300px; background-color: var(--bg-color); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; font-family: monospace; font-size: 0.875rem; resize: none; }
    </style>
</head>
<body>

    <header>
        <h1>✨ Organizador Visual do Drive (Com Subpastas!)</h1>
        <div class="actions">
            <button id="auto-btn" onclick="autoSuggest()">🤖 Auto-Sugestão</button>
            <button id="generate-btn" class="success" onclick="generateScript()">💾 Gerar Script PowerShell</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Coluna de Arquivos Soltos -->
        <div class="files-column">
            <div class="column-header">
                <span>Itens Soltos / Para Organizar</span>
                <span class="badge" id="files-count">0</span>
            </div>
            <div class="files-list" id="files-list"></div>
        </div>

        <!-- Coluna de Pastas Destino -->
        <div class="folders-column">
            <div class="folders-masonry" id="folders-grid"></div>
        </div>
    </div>

    <!-- Modal do Script -->
    <div class="modal-overlay" id="script-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Revisar e Salvar Script</h2>
                <button onclick="closeModal()" style="background:none; color:var(--text-muted); padding:0;">✕</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 1rem; color: var(--text-muted);">
                    Revise os comandos de movimentação abaixo. Nenhum arquivo foi movido ainda.
                </p>
                <textarea id="script-content" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button style="background-color: var(--surface-hover);" onclick="closeModal()">Cancelar</button>
                <button class="success" onclick="downloadScript()">📥 Baixar Script (.ps1)</button>
            </div>
        </div>
    </div>

    <script>
        // --- DADOS INJETADOS PELO POWERSHELL ---
        const INJECTED_DATA = /*DATA_PLACEHOLDER*/ {"files":[], "folders":[]} /*END_PLACEHOLDER*/;
        // ---------------------------------------

        let items = INJECTED_DATA.files || [];
        let allFolders = INJECTED_DATA.folders || []; // Array of strings like "10_BUSINESS", "10_BUSINESS\Assets"
        
        let movements = {}; // { "folder/path": [item, ...] }

        // Agrupar subpastas por pasta pai
        let folderTree = {};
        allFolders.forEach(f => {
            const parts = f.split('\\');
            const top = parts[0];
            if (!folderTree[top]) folderTree[top] = [];
            if (parts.length > 1) {
                folderTree[top].push(f);
            }
        });

        // Inicializar
        function init() {
            allFolders.forEach(f => movements[f] = []);
            renderFiles();
            renderFolders();
        }

        function getIcon(name, isFolder) {
            if (isFolder) return '📁';
            if(name.match(/\.(jpg|jpeg|png|gif|svg)$/i)) return '🖼️';
            if(name.match(/\.(pdf)$/i)) return '📕';
            if(name.match(/\.(zip|rar|7z)$/i)) return '📦';
            if(name.match(/\.(doc|docx|gdoc)$/i)) return '📝';
            if(name.match(/\.(xls|xlsx|gsheet|csv)$/i)) return '📊';
            return '📄';
        }

        function renderFiles() {
            const list = document.getElementById('files-list');
            list.innerHTML = '';
            document.getElementById('files-count').textContent = items.length;

            items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'file-card ' + (item.isFolder ? 'is-folder' : '');
                el.draggable = true;
                el.dataset.index = index;
                
                let icon = getIcon(item.name, item.isFolder);

                el.innerHTML = `
                    <div class="file-name">${icon} ${item.name}</div>
                    <div class="file-path">${item.path}</div>
                `;

                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', index);
                    setTimeout(() => el.style.opacity = '0.5', 0);
                });

                el.addEventListener('dragend', () => { el.style.opacity = '1'; });

                list.appendChild(el);
            });
        }

        function setupDropZone(el, targetPath) {
            el.addEventListener('dragover', (e) => {
                e.preventDefault();
                el.classList.add('drag-over');
            });
            el.addEventListener('dragleave', () => {
                el.classList.remove('drag-over');
            });
            el.addEventListener('drop', (e) => {
                e.preventDefault();
                el.classList.remove('drag-over');
                const itemIndex = e.dataTransfer.getData('text/plain');
                if (itemIndex !== '') {
                    moveFile(parseInt(itemIndex), targetPath);
                }
            });
        }

        function renderMovements(targetPath, container) {
            container.innerHTML = '';
            movements[targetPath].forEach((file, movedIdx) => {
                const item = document.createElement('div');
                item.className = 'moved-file';
                const icon = getIcon(file.name, file.isFolder);
                item.innerHTML = `
                    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:85%;" title="${file.name}">
                        ${icon} ${file.name}
                    </span>
                    <button class="undo-btn" onclick="undoMove('${targetPath.replace(/\\/g, '\\\\')}', ${movedIdx})" title="Desfazer">↩️</button>
                `;
                container.appendChild(item);
            });
        }

        function renderFolders() {
            const grid = document.getElementById('folders-grid');
            grid.innerHTML = '';

            Object.keys(folderTree).sort().forEach(topFolder => {
                const el = document.createElement('div');
                el.className = 'top-folder-container';
                
                let topIcon = '📁';
                if(topFolder.includes('BUSINESS')) topIcon = '💼';
                if(topFolder.includes('PERSONAL')) topIcon = '🧑‍💻';
                if(topFolder.includes('STUDY')) topIcon = '📚';
                if(topFolder.includes('CREATIVE')) topIcon = '🎨';
                if(topFolder.includes('GAMES') || topFolder.includes('Leisure')) topIcon = '🎮';
                
                // Header e Dropzone da pasta raiz
                let html = `
                    <div class="top-folder-header">
                        <span>${topIcon} ${topFolder}</span>
                    </div>
                    <div class="drop-zone" id="dz-${topFolder}">
                        <div class="drop-zone-title">Soltar na raiz de ${topFolder}</div>
                        <div class="move-container" id="mc-${topFolder}"></div>
                    </div>
                    <div class="subfolders-list">
                `;

                // Subpastas
                folderTree[topFolder].sort().forEach(sub => {
                    const subName = sub.split('\\')[1];
                    html += `
                        <div class="subfolder-item">
                            <div class="subfolder-header">📂 ${subName}</div>
                            <div class="subfolder-drop-zone" id="dz-${sub}">
                                <div class="move-container" id="mc-${sub}"></div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                el.innerHTML = html;
                grid.appendChild(el);

                // Setup dropzones and render movements
                setupDropZone(document.getElementById(`dz-${topFolder}`), topFolder);
                renderMovements(topFolder, document.getElementById(`mc-${topFolder}`));

                folderTree[topFolder].forEach(sub => {
                    setupDropZone(document.getElementById(`dz-${sub}`), sub);
                    renderMovements(sub, document.getElementById(`mc-${sub}`));
                });
            });
        }

        function moveFile(itemIndex, targetPath) {
            const item = items[itemIndex];
            items.splice(itemIndex, 1);
            movements[targetPath].push(item);
            renderFiles();
            renderFolders();
        }

        // Global functions for inline HTML calls
        window.undoMove = function(targetPath, movedIdx) {
            const item = movements[targetPath][movedIdx];
            movements[targetPath].splice(movedIdx, 1);
            items.push(item);
            renderFiles();
            renderFolders();
        };

        window.autoSuggest = function() {
            // Suggestion logic
        };

        window.generateScript = function() {
            let script = "# Script gerado pelo Organizador Visual do Drive\n";
            script += "$ErrorActionPreference = 'Stop'\n\n";
            let hasMoves = false;

            Object.keys(movements).forEach(folder => {
                const movedItems = movements[folder];
                if (movedItems.length > 0) {
                    hasMoves = true;
                    script += `# Movendo para ${folder}\n`;
                    const targetPath = `G:\\Meu Drive\\ORGANIZAR ESSA BOMBA\\${folder}`;
                    script += `if (!(Test-Path -LiteralPath "${targetPath}")) { New-Item -ItemType Directory -Path "${targetPath}" | Out-Null }\n`;
                    
                    movedItems.forEach(item => {
                        script += `Move-Item -LiteralPath "${item.fullPath}" -Destination "${targetPath}" -Force\n`;
                    });
                    script += `\n`;
                }
            });

            if (!hasMoves) script += "# Nenhum arquivo foi movido.\n";
            
            document.getElementById('script-content').value = script;
            document.getElementById('script-modal').style.display = 'flex';
        };

        window.closeModal = function() { document.getElementById('script-modal').style.display = 'none'; };

        window.downloadScript = function() {
            const script = document.getElementById('script-content').value;
            const blob = new Blob([script], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Mover-Arquivos.ps1';
            document.body.appendChild(a); a.click();
            window.URL.revokeObjectURL(url); document.body.removeChild(a);
        };

        init();
    </script>
</body>
</html>
