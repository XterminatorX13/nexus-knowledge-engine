<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Visual do Drive - Evolução Extrema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --surface-active: #0ea5e9;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --magic: #8b5cf6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background-color: var(--surface); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10; }
        header h1 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .actions { display: flex; gap: 1rem; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 0.5rem; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button.success { background-color: var(--success); }
        button.success:hover { background-color: #059669; }
        button.magic { background-color: var(--magic); }
        button.magic:hover { background-color: #7c3aed; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .panel-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; justify-content: space-between; align-items: center; background-color: var(--surface); flex-shrink: 0; }
        .badge { background-color: var(--primary); color: white; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }

        /* Left Panel - Loose Files */
        .files-panel { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background-color: var(--surface); }
        
        .search-bar { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); background-color: var(--bg-color); }
        .search-bar input { width: 100%; padding: 0.5rem 1rem; border-radius: 9999px; border: 1px solid var(--border); background-color: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .search-bar input:focus { border-color: var(--primary); }

        .files-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        
        .file-card { background-color: var(--bg-color); border: 2px solid transparent; border-radius: 0.5rem; padding: 0.75rem; cursor: grab; display: flex; flex-direction: column; gap: 0.5rem; transition: all 0.15s ease-out; position: relative; user-select: none; }
        .file-card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .file-card.selected { border-color: var(--primary); background-color: rgba(59, 130, 246, 0.1); }
        .file-card:active { cursor: grabbing; }
        
        .file-info { flex: 1; }
        .file-name { font-size: 0.85rem; font-weight: 500; word-break: break-all; }
        .file-path { font-size: 0.65rem; color: var(--text-muted); }
        
        /* Inline Actions (Scoring & Dropdown) */
        .file-actions { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
        .btn-inline-suggest { flex: 1; background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); padding: 0.3rem 0.5rem; border-radius: 0.25rem; font-size: 0.7rem; display: flex; justify-content: center; align-items: center; gap: 0.25rem; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .btn-inline-suggest:hover { background-color: var(--magic); color: white; }
        .btn-inline-suggest.no-match { opacity: 0.5; cursor: default; }
        .btn-inline-suggest.no-match:hover { background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd; }
        
        .folder-select-dropdown { background-color: var(--surface-hover); color: var(--text); border: 1px solid var(--border); border-radius: 0.25rem; padding: 0.2rem; font-size: 0.7rem; cursor: pointer; max-width: 30px; outline: none; }

        /* Dragging Avatar */
        .drag-avatar { position: absolute; top: -1000px; background-color: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 9999px; font-weight: 600; font-size: 0.8rem; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); pointer-events: none; }

        /* Center Panel - Miller Columns */
        .miller-panel { flex: 1; display: flex; overflow-x: auto; overflow-y: hidden; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); }
        .column { width: 280px; min-width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background-color: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .column-header-dz { padding: 0.75rem; font-size: 0.8rem; font-weight: 500; text-align: center; color: var(--text-muted); border-bottom: 1px dashed var(--border); background-color: rgba(0,0,0,0.2); transition: all 0.2s; }
        .column-header-dz.drag-over { background-color: rgba(59, 130, 246, 0.2); color: var(--primary); border-color: var(--primary); }
        .column-list { flex: 1; overflow-y: auto; }
        .folder-item { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; font-size: 0.9rem; }
        .folder-item:hover { background-color: var(--surface-hover); }
        .folder-item.active { background-color: var(--primary); color: white; }
        .folder-item.drag-over { background-color: rgba(59, 130, 246, 0.4); border-left: 4px solid var(--primary); }
        .folder-icon-text { display: flex; align-items: center; gap: 0.5rem; overflow: hidden; }
        .folder-icon-text span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chevron { color: var(--text-muted); font-size: 0.8rem; }
        .folder-item.active .chevron { color: white; }

        /* Right Panel - Pending Moves */
        .moves-panel { width: 320px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background-color: var(--surface); }
        .moves-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .move-card { background-color: var(--bg-color); border: 1px solid var(--primary); border-radius: 0.5rem; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .move-file { font-size: 0.8rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .move-target { font-size: 0.7rem; color: var(--success); display: flex; align-items: center; gap: 0.25rem; word-break: break-all; }
        .move-actions { display: flex; justify-content: flex-end; margin-top: 0.25rem; }
        .btn-undo { background: none; border: none; color: var(--danger); font-size: 0.75rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 0.25rem; }
        .btn-undo:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 50; }
        .modal { background-color: var(--surface); border-radius: 1rem; width: 80%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; }
        
        /* Preview Table */
        .preview-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .preview-table th { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); color: var(--text-muted); }
        .preview-table td { padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .preview-table tr:hover td { background-color: var(--surface-hover); }
        
        textarea { width: 100%; height: 300px; background-color: var(--bg-color); color: var(--text); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; font-family: monospace; font-size: 0.875rem; resize: none; }
    </style>
</head>
<body>

    <header>
        <h1>⚡ Organizador Visual - Evolução Extrema</h1>
        <div class="actions">
            <button class="magic" onclick="openAutoSuggestPreview()">✨ Inteligência Artificial (Preview)</button>
            <button class="success" onclick="generateScript()">💾 Gerar PowerShell</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Esquerda: Arquivos Soltos -->
        <div class="files-panel">
            <div class="panel-header">
                <span>Itens Soltos</span>
                <span class="badge" id="files-count">0</span>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="🔍 Buscar arquivos ou caminhos..." oninput="filterFiles()">
            </div>
            <div class="files-list" id="files-list"></div>
        </div>

        <!-- Centro: Miller Columns -->
        <div class="miller-panel" id="miller-columns"></div>

        <!-- Direita: Ações Pendentes -->
        <div class="moves-panel">
            <div class="panel-header">
                <span>Ações Pendentes</span>
                <span class="badge" id="moves-count" style="background-color: var(--warning);">0</span>
            </div>
            <div class="moves-list" id="moves-list"></div>
        </div>
    </div>

    <!-- Drag Avatar (Visual representation for multi-select drag) -->
    <div id="drag-avatar" class="drag-avatar">Movendo X itens</div>

    <!-- Modal de Preview da IA -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>✨ Confirmação de IA</h2>
                <button onclick="closeModal('preview-modal')" style="background:none; color:var(--text-muted); padding:0;">✕</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 1rem; color: var(--text-muted);">
                    O Motor de Scoring analisou seus arquivos e encontrou destinos ideais para <span id="preview-count" style="color:white; font-weight:bold;">0</span> itens.
                </p>
                <table class="preview-table">
                    <thead>
                        <tr>
                            <th>Arquivo</th>
                            <th>Destino Sugerido</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="preview-tbody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button style="background-color: var(--surface-hover);" onclick="closeModal('preview-modal')">Cancelar</button>
                <button class="magic" onclick="confirmAutoSuggest()">✅ Aprovar e Mover Todos</button>
            </div>
        </div>
    </div>

    <!-- Modal do Script -->
    <div class="modal-overlay" id="script-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>💾 Revisar e Salvar Script</h2>
                <button onclick="closeModal('script-modal')" style="background:none; color:var(--text-muted); padding:0;">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="script-content" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button style="background-color: var(--surface-hover);" onclick="closeModal('script-modal')">Cancelar</button>
                <button class="success" onclick="downloadScript()">📥 Baixar .ps1</button>
            </div>
        </div>
    </div>

    <script>
        // --- INJEÇÃO DE DADOS ---
        const INJECTED_DATA = /*DATA_PLACEHOLDER*/ {
            "files": [], 
            "folders": []
        } /*END_PLACEHOLDER*/;



        // Estado Global
        let items = INJECTED_DATA.files.map(f => ({ ...f, id: Math.random().toString(36).substr(2, 9) }));
        let allFolders = INJECTED_DATA.folders.sort();
        let pendingMoves = []; 
        let activePath = []; 
        let selectedFileIds = new Set();
        let lastSelectedId = null;
        let searchQuery = "";
        let previewMovesQueue = []; // Para o modal de IA

        // Dropdown HTML para subpastas pré-computado
        const allFoldersOptions = allFolders.map(f => `<option value="${f}">${f}</option>`).join('');

        // Construir a árvore
        let folderTree = {};
        function buildTree() {
            folderTree = {};
            allFolders.forEach(path => {
                const parts = path.split('\\');
                let current = folderTree;
                parts.forEach(part => {
                    if (!current[part]) current[part] = {};
                    current = current[part];
                });
            });
        }
        buildTree();

        // Inicialização
        function init() {
            renderFiles();
            renderMillerColumns();
            renderPendingMoves();
            
            // Atalhos de Teclado
            document.addEventListener('keydown', handleKeyboardShortcuts);
        }

        // --- SISTEMA DE INTELIGÊNCIA (Scoring Engine) ---
        function scoreFolder(fileName, folderPath) {
            let score = 0;
            const nameL = fileName.toLowerCase();
            const pathL = folderPath.toLowerCase();
            
            // Extensão
            const extMatch = nameL.match(/\.([^.]+)$/);
            const ext = extMatch ? extMatch[1] : '';

            // Regras de Negócios / Financeiro
            if (pathL.includes('finance') || pathL.includes('business')) {
                if (nameL.includes('fatura') || nameL.includes('comprovante') || nameL.includes('recibo') || nameL.includes('boleto') || nameL.includes('custos')) score += 50;
                if (['xls', 'xlsx', 'csv'].includes(ext)) score += 20;
            }
            // Regras Pessoais
            if (pathL.includes('personal') || pathL.includes('documentos')) {
                if (nameL.includes('rg') || nameL.includes('cnh') || nameL.includes('currículo') || nameL.includes('digital')) score += 50;
            }
            // Criativo / Imagens
            if (pathL.includes('creative') || pathL.includes('imagens')) {
                if (['jpg', 'jpeg', 'png', 'gif', 'svg'].includes(ext)) {
                    if (!nameL.includes('whatsapp') && !nameL.includes('screenshot')) score += 30;
                }
            }
            // Arquivo Morto / Takeout
            if (pathL.includes('archive') || pathL.includes('takeout') || pathL.includes('90')) {
                if (nameL.includes('takeout')) score += 100;
                if (nameL.includes('whatsapp') || nameL.includes('screenshot')) score += 40;
            }
            // Games
            if (pathL.includes('games') || pathL.includes('jogos')) {
                if (nameL.includes('game') || nameL.includes('jogo')) score += 50;
            }

            // Word Match (Qualquer palavra com mais de 3 letras que bata no caminho)
            const words = nameL.split(/[\s\-_.]+/);
            words.forEach(w => {
                if (w.length > 3 && pathL.includes(w)) score += 10;
            });

            // Prefere pastas mais profundas se der empate (ex: Financeiro > BUSINESS)
            score += folderPath.split('\\').length * 2;

            return score;
        }

        function getBestMatch(file) {
            let bestScore = -1;
            let bestFolder = null;
            allFolders.forEach(folder => {
                const s = scoreFolder(file.name, folder);
                if (s > bestScore && s > 15) { // Threshold mínimo de 15 pontos
                    bestScore = s;
                    bestFolder = folder;
                }
            });
            return { folder: bestFolder, score: bestScore };
        }


        // --- UI RENDERIZERS ---

        function getIcon(name, isFolder) {
            if (isFolder) return '📁';
            if(name.match(/\.(jpg|jpeg|png|gif|svg)$/i)) return '🖼️';
            if(name.match(/\.(pdf)$/i)) return '📕';
            if(name.match(/\.(zip|rar|7z)$/i)) return '📦';
            if(name.match(/\.(doc|docx|gdoc)$/i)) return '📝';
            if(name.match(/\.(xls|xlsx|gsheet|csv)$/i)) return '📊';
            return '📄';
        }

        function getFolderIcon(folderName) {
            const lower = folderName.toLowerCase();
            if(lower.includes('business') || lower.includes('finance')) return '💼';
            if(lower.includes('personal') || lower.includes('document')) return '🧑‍💻';
            if(lower.includes('study')) return '📚';
            if(lower.includes('creative') || lower.includes('imagen')) return '🎨';
            if(lower.includes('games')) return '🎮';
            if(lower.includes('archive')) return '🗄️';
            return '📁';
        }

        window.filterFiles = function() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            renderFiles();
        };

        function renderFiles() {
            const list = document.getElementById('files-list');
            list.innerHTML = '';
            
            let filtered = items;
            if (searchQuery) {
                filtered = items.filter(i => i.name.toLowerCase().includes(searchQuery) || i.path.toLowerCase().includes(searchQuery));
            }
            
            document.getElementById('files-count').textContent = filtered.length;

            filtered.forEach((item, index) => {
                const el = document.createElement('div');
                const isSelected = selectedFileIds.has(item.id);
                el.className = 'file-card ' + (item.isFolder ? 'is-folder' : '') + (isSelected ? ' selected' : '');
                el.draggable = true;
                
                const icon = getIcon(item.name, item.isFolder);
                const match = getBestMatch(item);
                
                // Botão 1-Click Suggest
                let suggestBtn = '';
                if (match.folder) {
                    const shortName = match.folder.split('\\').pop();
                    suggestBtn = `<button class="btn-inline-suggest" onclick="event.stopPropagation(); executeMove(['${item.id}'], '${match.folder.replace(/\\/g, '\\\\')}')" title="Sugerido (Score: ${match.score}): ${match.folder}">✨ ${shortName}</button>`;
                } else {
                    suggestBtn = `<button class="btn-inline-suggest no-match" disabled>✨ S/ Match</button>`;
                }

                el.innerHTML = `
                    <div class="file-info">
                        <div class="file-name">${icon} ${item.name}</div>
                        <div class="file-path">${item.path}</div>
                    </div>
                    <div class="file-actions">
                        ${suggestBtn}
                        <select class="folder-select-dropdown" onclick="event.stopPropagation()" onchange="if(this.value){ executeMove(['${item.id}'], this.value); this.value=''; }">
                            <option value="">▼</option>
                            ${allFoldersOptions}
                        </select>
                    </div>
                `;

                // Multi-select logic
                el.addEventListener('click', (e) => {
                    handleSelection(e, item.id, filtered);
                });

                // Drag & Drop
                el.addEventListener('dragstart', (e) => {
                    if (!selectedFileIds.has(item.id)) {
                        selectedFileIds.clear();
                        selectedFileIds.add(item.id);
                        renderFiles();
                    }
                    e.dataTransfer.setData('application/json', JSON.stringify(Array.from(selectedFileIds)));
                    
                    // Setup Drag Avatar
                    const avatar = document.getElementById('drag-avatar');
                    avatar.textContent = `Movendo ${selectedFileIds.size} item(s)`;
                    e.dataTransfer.setDragImage(avatar, 0, 0);
                    
                    setTimeout(() => el.style.opacity = '0.5', 0);
                });

                el.addEventListener('dragend', () => { 
                    el.style.opacity = '1'; 
                    selectedFileIds.clear(); // Opcional: limpar seleção após drag
                    renderFiles();
                });

                list.appendChild(el);
            });
        }

        function handleSelection(e, id, visibleItems) {
            if (e.ctrlKey || e.metaKey) {
                if (selectedFileIds.has(id)) selectedFileIds.delete(id);
                else selectedFileIds.add(id);
            } else if (e.shiftKey && lastSelectedId) {
                const startIdx = visibleItems.findIndex(i => i.id === lastSelectedId);
                const endIdx = visibleItems.findIndex(i => i.id === id);
                const min = Math.min(startIdx, endIdx);
                const max = Math.max(startIdx, endIdx);
                selectedFileIds.clear();
                for (let i = min; i <= max; i++) {
                    selectedFileIds.add(visibleItems[i].id);
                }
            } else {
                selectedFileIds.clear();
                selectedFileIds.add(id);
            }
            lastSelectedId = id;
            renderFiles();
        }

        // Miller Columns (DOM Diffing/Partial render wasn't strictly necessary for a few columns, but let's keep it clean)
        function renderMillerColumns() {
            const container = document.getElementById('miller-columns');
            container.innerHTML = '';

            renderColumn(container, folderTree, 0, []);
            let currentTree = folderTree;
            for (let i = 0; i < activePath.length; i++) {
                const folderName = activePath[i];
                currentTree = currentTree[folderName];
                if (currentTree && Object.keys(currentTree).length > 0) {
                    renderColumn(container, currentTree, i + 1, activePath.slice(0, i + 1));
                }
            }
            container.scrollLeft = container.scrollWidth;
        }

        function renderColumn(container, treeNode, depth, currentPathArray) {
            const col = document.createElement('div');
            col.className = 'column';

            const folderNames = Object.keys(treeNode).sort();
            const parentPathString = currentPathArray.join('\\');
            const dropTitle = depth === 0 ? "Soltar na Raiz do Drive" : `Soltar em ${currentPathArray[currentPathArray.length-1]}`;
            
            const headerDz = document.createElement('div');
            headerDz.className = 'column-header-dz';
            headerDz.innerText = '📥 ' + dropTitle;
            setupDropZone(headerDz, parentPathString);
            col.appendChild(headerDz);

            const list = document.createElement('div');
            list.className = 'column-list';

            folderNames.forEach(folderName => {
                const item = document.createElement('div');
                const isSelected = activePath[depth] === folderName;
                item.className = 'folder-item ' + (isSelected ? 'active' : '');
                
                const hasChildren = Object.keys(treeNode[folderName]).length > 0;
                item.innerHTML = `
                    <div class="folder-icon-text"><span>${getFolderIcon(folderName)}</span> <span>${folderName}</span></div>
                    ${hasChildren ? '<span class="chevron">▶</span>' : ''}
                `;

                item.addEventListener('click', () => {
                    activePath = activePath.slice(0, depth);
                    activePath.push(folderName);
                    renderMillerColumns();
                });

                const thisFolderPath = currentPathArray.length > 0 ? `${parentPathString}\\${folderName}` : folderName;
                setupDropZone(item, thisFolderPath);
                list.appendChild(item);
            });

            col.appendChild(list);
            container.appendChild(col);
        }

        function renderPendingMoves() {
            const list = document.getElementById('moves-list');
            list.innerHTML = '';
            document.getElementById('moves-count').textContent = pendingMoves.length;

            [...pendingMoves].reverse().forEach((move, reverseIdx) => {
                const realIdx = pendingMoves.length - 1 - reverseIdx;
                const el = document.createElement('div');
                el.className = 'move-card';
                el.innerHTML = `
                    <div class="move-file" title="${move.file.name}">${getIcon(move.file.name, move.file.isFolder)} ${move.file.name}</div>
                    <div class="move-target">➡️ ${move.targetPath}</div>
                    <div class="move-actions">
                        <button class="btn-undo" onclick="undoMove(${realIdx})">↩️ Desfazer</button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        // --- Drag & Drop & Move Logic ---
        function setupDropZone(el, targetPath) {
            el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
            el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
            el.addEventListener('drop', e => {
                e.preventDefault();
                el.classList.remove('drag-over');
                const data = e.dataTransfer.getData('application/json');
                if (data && targetPath !== "") {
                    const ids = JSON.parse(data);
                    executeMove(ids, targetPath);
                }
            });
        }

        window.executeMove = function(fileIdsArray, targetPath) {
            fileIdsArray.forEach(id => {
                const idx = items.findIndex(i => i.id === id);
                if (idx > -1) {
                    const file = items[idx];
                    items.splice(idx, 1);
                    pendingMoves.push({ file, targetPath });
                }
            });
            selectedFileIds.clear();
            renderFiles();
            renderPendingMoves();
        };

        window.undoMove = function(index) {
            const move = pendingMoves[index];
            pendingMoves.splice(index, 1);
            items.push(move.file);
            renderFiles();
            renderPendingMoves();
        };

        // --- IA Preview & Confirm ---
        window.openAutoSuggestPreview = function() {
            previewMovesQueue = [];
            items.forEach(file => {
                const match = getBestMatch(file);
                if (match.folder) {
                    previewMovesQueue.push({ file, targetPath: match.folder, score: match.score });
                }
            });

            if (previewMovesQueue.length === 0) {
                alert("A Inteligência Artificial não encontrou sugestões com alta confiança para os arquivos restantes.");
                return;
            }

            document.getElementById('preview-count').textContent = previewMovesQueue.length;
            const tbody = document.getElementById('preview-tbody');
            tbody.innerHTML = '';
            previewMovesQueue.sort((a,b) => b.score - a.score).forEach(m => {
                tbody.innerHTML += `
                    <tr>
                        <td>${getIcon(m.file.name, m.file.isFolder)} ${m.file.name}</td>
                        <td style="color:var(--success)">${m.targetPath}</td>
                        <td style="color:var(--text-muted)">${m.score} pts</td>
                    </tr>
                `;
            });

            document.getElementById('preview-modal').style.display = 'flex';
        };

        window.confirmAutoSuggest = function() {
            const ids = previewMovesQueue.map(m => m.file.id);
            // Move individualmente para o target certo (já que cada um tem o seu)
            previewMovesQueue.forEach(m => {
                executeMove([m.file.id], m.targetPath);
            });
            closeModal('preview-modal');
        };

        // --- Modals & Script Gen ---
        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

        window.generateScript = function() {
            let script = "# Script Evolução Extrema\n$ErrorActionPreference = 'Stop'\n\n";
            if (pendingMoves.length === 0) {
                script += "# Nada para mover.\n";
            } else {
                const grouped = {};
                pendingMoves.forEach(m => {
                    if(!grouped[m.targetPath]) grouped[m.targetPath] = [];
                    grouped[m.targetPath].push(m.file);
                });
                Object.keys(grouped).forEach(targetFolder => {
                    script += `# Movendo para ${targetFolder}\n`;
                    const targetFullPath = `G:\\Meu Drive\\ORGANIZAR ESSA BOMBA\\${targetFolder}`;
                    script += `if (!(Test-Path -LiteralPath "${targetFullPath}")) { New-Item -ItemType Directory -Path "${targetFullPath}" -Force | Out-Null }\n`;
                    grouped[targetFolder].forEach(file => {
                        script += `Move-Item -LiteralPath "${file.fullPath}" -Destination "${targetFullPath}" -Force\n`;
                    });
                    script += `\n`;
                });
                script += "Write-Host 'Magia concluída!' -ForegroundColor Magenta\n";
            }
            document.getElementById('script-content').value = script;
            document.getElementById('script-modal').style.display = 'flex';
        };

        window.downloadScript = function() {
            const script = document.getElementById('script-content').value;
            const blob = new Blob([script], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Mover-Arquivos-Inteligente.ps1';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
        };

        // Keyboard navigation (Basic)
        function handleKeyboardShortcuts(e) {
            // Se estiver num input, não interceptar
            if(document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

            // Delete = desfazer o ultimo
            if(e.key === 'Backspace' && pendingMoves.length > 0) {
                undoMove(pendingMoves.length - 1);
            }
        }

        init();
    </script>
</body>
</html>
